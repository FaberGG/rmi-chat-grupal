# PUNTO i: Archivo de configuración del servidor de chat RMI
# Contiene la dirección IP y el puerto del Name Server (rmiRegistry)
# Modifique estos valores según su entorno de red

# Dirección IP donde se encuentra el rmiRegistry (Name Server)
# Usar "localhost" si el servidor corre en la misma máquina
ns.ip=localhost

# Puerto por el cual escucha el rmiRegistry
ns.puerto=8080
